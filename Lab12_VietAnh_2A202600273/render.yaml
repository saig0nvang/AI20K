services:
  - type: web
    name: ultimate-ai-agent
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 10000
      - key: LOG_LEVEL
        value: INFO
      - key: REDIS_URL
        fromService:
          name: cache
          type: redis
          property: connectionString

  - type: redis
    name: cache
    ipAllowList: [] # Chỉ cho phép nội bộ
